<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 170" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    .box { fill: #ffffff; stroke: #000000; stroke-width: 1.2; filter: url(#shadow); }
    .shape { fill: #ffffff; stroke: #000000; stroke-width: 1.2; }
    .line { stroke: #000000; stroke-width: 1.2; }
    .dashed-line { stroke: #000000; stroke-width: 1.2; stroke-dasharray: 5, 4; }
    .text { font-family: Helvetica, Arial, sans-serif; font-size: 13px; fill: #000000; }
    .title { font-weight: bold; }
  </style>

  <g transform="translate(15, 15)">
    <rect x="0" y="0" width="165" height="135" class="box"/>
    
    <line x1="0" y1="24" x2="165" y2="24" class="line"/>
    <line x1="0" y1="76" x2="165" y2="76" class="line"/>

    <text x="82.5" y="17" class="text title" text-anchor="middle">Person</text>

    <text x="6" y="42" class="text">lastName</text>
    <text x="6" y="58" class="text">firstName</text>
    <text x="6" y="74" class="text">numberOfDependents</text>

    <text x="6" y="94" class="text">getExemption</text>
    <text x="6" y="110" class="text">isFlaggedForAudit</text>
    <text x="6" y="126" class="text">getTaxableEarnings</text>
  </g>

  <g transform="translate(255, 35)">
    <rect x="0" y="0" width="142" height="95" class="box"/>
    
    <line x1="0" y1="24" x2="142" y2="24" class="line"/>
    <line x1="0" y1="36" x2="142" y2="36" class="line"/>

    <text x="71" y="17" class="text title" text-anchor="middle">Person Mapper</text>

    <text x="6" y="54" class="text">insert</text>
    <text x="6" y="70" class="text">update</text>
    <text x="6" y="86" class="text">delete</text>
  </g>

  <g transform="translate(485, 50)">
    <path d="M 0 10 L 0 50 C 0 60.5, 67 60.5, 67 50 L 67 10 Z" class="box"/>
    <ellipse cx="33.5" cy="10" rx="33.5" ry="8" class="shape"/>
  </g>

  <line x1="255" y1="82.5" x2="185" y2="82.5" class="dashed-line"/>
  <polyline points="192,77 185,82.5 192,88" fill="none" stroke="#000000" stroke-width="1.2"/>

  <line x1="397" y1="82.5" x2="480" y2="82.5" class="dashed-line"/>
  <polyline points="473,77 480,82.5 473,88" fill="none" stroke="#000000" stroke-width="1.2"/>

</svg>
